# VocabMaster Docker Compose 配置（开发环境）
# 包含 PostgreSQL 数据库和 Next.js 应用
# 注意：所有敏感配置通过 .env 文件注入，请参考 .env.example

version: "3.8"

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    container_name: vocab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vocab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vocab_dev_123}
      POSTGRES_DB: ${POSTGRES_DB:-vocabmaster}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vocab} -d ${POSTGRES_DB:-vocabmaster}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Next.js 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vocab-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-vocab}:${POSTGRES_PASSWORD:-vocab_dev_123}@db:5432/${POSTGRES_DB:-vocabmaster}?schema=public"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-secret-do-not-use-in-production}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
