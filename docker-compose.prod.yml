# VocabMaster 生产环境 Docker Compose 配置
# 使用方式：docker compose -f docker-compose.prod.yml up -d
# 注意：所有敏感配置通过 .env 文件注入，请参考 .env.example

version: "3.8"

services:
  # PostgreSQL 数据库（使用 5433 端口避免与服务器已有 PostgreSQL 冲突）
  vocab-db:
    image: postgres:16-alpine
    container_name: vocab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vocab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-vocabmaster}
    ports:
      - "5433:5432"
    volumes:
      - vocab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vocab} -d ${POSTGRES_DB:-vocabmaster}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Next.js 应用（使用 3003 端口，子路径 /vocab）
  vocab-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
    container_name: vocab-app
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-vocab}:${POSTGRES_PASSWORD}@vocab-db:5432/${POSTGRES_DB:-vocabmaster}?schema=public"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXT_PUBLIC_BASE_PATH: "${NEXT_PUBLIC_BASE_PATH:-}"
      # 百度翻译 API（用于例句中文翻译）
      BAIDU_TRANSLATE_APPID: "${BAIDU_TRANSLATE_APPID}"
      BAIDU_TRANSLATE_SECRET: "${BAIDU_TRANSLATE_SECRET}"
      # 邮箱 SMTP（用于密码重置、邮箱验证等）
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL}"
    depends_on:
      vocab-db:
        condition: service_healthy

volumes:
  vocab_postgres_data:
